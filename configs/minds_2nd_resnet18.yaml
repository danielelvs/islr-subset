experiment_name: minds_2nd_resnet18
dataset: minds
subset: 2nd
extractor: mediapipe
imputation: spline
image_method: Skeleton-DML
model: resnet18

training:
  epochs: 30
  batch_size: 64
  learning_rate: 0.0001
  weight_decay: 0.0001
  patience: 5
  seed: 42

augmentation:
  rotation_sigma: 12
  zoom_sigma: 0.1
  translate_x_sigma: 0.06
  horizontal_flip_prob: 0.5

evaluation:
  protocol: lopo
  # test_people and validate_people are passed via CLI (-tp, -vp)
