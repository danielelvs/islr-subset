experiment_name: ksl_resnet18
dataset: ksl
# KSL uses pre-processed OpenPose CSV — no subset/extractor config needed
image_method: Skeleton-DML
model: resnet18

training:
  epochs: 50
  batch_size: 64
  learning_rate: 0.0001
  weight_decay: 0.0001
  patience: 5
  seed: 42

augmentation:
  rotation_sigma: 12
  zoom_sigma: 0.1
  translate_x_sigma: 0.06
  horizontal_flip_prob: 0.5

